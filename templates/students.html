{{define "content"}}
    <h1>All Students</h1>
    <form action="/students/new" method="GET">
       <button type="submit" class="btn-register">Register Student</button>
    </form>
    <table>
        <tr>
            <th>First Name</th>  
            <th>Last Name</th>  
            <th>Course</th> 
            <th>Actions</th>
        </tr>
        {{range .}}
        <tr>
    <td>{{.FirstName}}</td>
    <td>{{.LastName}}</td>
    <td>{{.Course}}</td>
    <td>
        <a href="/student?id={{.ID}}" class="btn-view">View</a> |
        <a href="/students/edit?id={{.ID}}" class="btn-edit">Edit</a> |

        <a href="/students/confirmdelete?id={{.ID}}" class="btn-delete">
            Delete
        </a>
    </td>
    </tr>
    {{else}}
    <p>No registered student.</p>
    {{end}}
    </table>
{{end}}
